version: '3.8'

services:
  # 前端服务
  frontend:
    build: 
      context: ./frontend
      args:
        - NODE_ENV=production
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  # 后端服务
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: python:3.11-slim
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_PORT=8000
      - API_HOST=0.0.0.0
    volumes:
      - ./backend/app:/app

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
